<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fex Box.</title>
</head>
<style>
    div.Pai {

        background-color: rgb(78, 236, 15);
        display: flex; /*Usado no Pai*/
       flex-wrap: nowrap;
       height: 50px;
       
    }

    .item { 

        background-color: blue;
        margin: 1px;
        width: 20px;
        height: 20px;
       padding: 10px;
        border-radius: 50%;
        color: rgba(255, 0, 0, 0.719);
        font-weight: bolder;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        margin: auto;
    }

    .N {

        display: flex;
        background-color: rgb(216, 207, 207);
        justify-content: space-between;
       margin-top: 50%;
       height: 30px;
    }

    .F {

        color: blue;
        margin: 5px;
        font-size: 18px;
        font-weight: bolder;

    }
</style>
<body>

    <div class="Pai">
        <div class="item">A</div>
        <div  class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
    </div>

    <div class="N">
        <div class="F">Fernando</div>
        <div class="F">Jose</div>
    </div>
    
</body>
</html>
